<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Adel | MOHA</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff00ff;
            --dark: #0a0f14;
            --card-bg: rgba(10, 15, 20, 0.95);
        }

        body {
            background: var(--dark);
            background-image: radial-gradient(circle at center, #1a2a3a 0%, #0a0f14 100%);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page-container {
            width: 100%;
            max-width: 420px;
            padding-bottom: 50px;
        }

        /* الهيدر العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(10, 15, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--pink);
            text-shadow: 0 0 15px var(--pink);
        }

        .header .nav {
            display: flex;
            gap: 20px;
        }

        .header .nav a {
            text-decoration: none;
            color: #ccc;
            font-size: 16px;
        }

        .header .nav a.active {
            color: white;
            border-bottom: 2px solid var(--pink);
            padding-bottom: 4px;
        }

        /* الكارد الرئيسي */
        .main-content {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        /* صورة البروفايل المحدثة */
        .avatar-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            position: relative;
        }

        .avatar-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            box-shadow: 0 0 25px var(--cyan);
            overflow: hidden;
            background: #000;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* الاسم الجديد */
        h1 { 
            font-size: 32px; 
            margin: 10px 0; 
            font-weight: 800;
        }

        .name-main { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .name-sub { color: var(--pink); text-shadow: 0 0 10px var(--pink); }

        /* الوصف المحدث */
        .bio { 
            font-size: 19px; 
            line-height: 1.8; 
            color: #e0e0e0; 
            margin: 20px 0;
            font-weight: 400;
        }

        /* الأزرار العائمة */
        .floating-controls {
            position: fixed;
            right: 25px;
            top: 55%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 99;
        }

        .f-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 22px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .btn-web { background: #00d2ff; color: white; }
        .btn-music { background: #ff4081; color: white; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 64, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 64, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 64, 129, 0); }
        }

        /* روابط التواصل المحدثة */
        .social-bar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            padding: 0 20px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        #music-player { display: none; }
    </style>
</head>
<body>

<div class="page-container">
    <header class="header">
        <nav class="nav">
            <a href="#">تواصل</a>
            <a href="#">عني</a>
            <a href="#" class="active">الرئيسية</a>
        </nav>
        <div class="logo">MOHA</div>
    </header>

    <main class="main-content">
        <div class="avatar-wrapper">
            <div class="avatar-container">
                <img src="https://i.ibb.co/3mS7pXG/image-0.png" alt="Ahmed Adel / MOHA">
            </div>
        </div>
        
        <h1><span class="name-main">Ahmed adel</span> / <span class="name-sub">moha</span></h1>

        <p class="bio">
            عاشق للتصميم المعماري ومجال التداول والبرمجة
        </p>

        <div class="floating-controls">
            <a href="https://mido0998-11.github.io/-/" class="f-btn btn-web">🌐</a>
            <button onclick="toggleMusic()" class="f-btn btn-music" id="musicBtn">🎵</button>
        </div>

        <div class="social-bar">
            <a href="https://www.facebook.com/share/18bsBUgnkD/?mibextid=wwXIfr" class="social-link" style="border-color: #1877F2;">
                Facebook
            </a>
            <a href="https://www.instagram.com/its_moha249?igsh=MXFnYTdwdWh5Y2NzMQ%3D%3D&utm_source=qr" class="social-link" style="border-color: #E1306C;">
                Instagram
            </a>
            <a href="https://wa.me/249116881415" class="social-link" style="border-color: #25D366;">
                WhatsApp: 0116881415
            </a>
        </div>
    </main>
</div>

<div id="music-player">
    <iframe id="audio-frame" src="https://mido0998-11.github.io/-/" allow="autoplay"></iframe>
</div>

<script>
    var isPlaying = false;
    function toggleMusic() {
        var btn = document.getElementById('musicBtn');
        var audio = document.getElementById('audio-frame');
        
        if (!isPlaying) {
            // تفعيل الموسيقى من الرابط
            audio.src = "https://mido0998-11.github.io/-/"; 
            isPlaying = true;
            btn.style.animation = "pulse 1s infinite";
        } else {
            audio.src = "";
            isPlaying = false;
            btn.style.animation = "none";
        }
    }

    // تشغيل تلقائي عند أول تفاعل
    document.body.addEventListener('click', function() {
        if(!isPlaying) toggleMusic();
    }, { once: true });
</script>

</body>
</html>
