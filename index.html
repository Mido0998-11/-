<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Adel | MOHA Empire</title>
    <style>
        :root {
            --neon: #00f2ff;
            --green: #39ff14;
            --pink: #ff00ff;
            --gold: #f39c12;
            --dark: #0a0f14;
            --card-bg: rgba(23, 33, 43, 0.98);
        }

        body {
            background: var(--dark);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--neon);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            position: relative;
        }

        .avatar-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 10px var(--neon);
            overflow: hidden;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { 
            font-size: 22px; 
            color: white; 
            margin: 5px 0; 
            text-shadow: 0 0 5px var(--neon);
        }

        .subtitle { 
            color: var(--neon); 
            font-size: 13px; 
            font-weight: bold;
            display: block; 
            margin-bottom: 15px; 
            letter-spacing: 1px;
        }
        
        .bio { 
            font-size: 13.5px; 
            line-height: 1.6; 
            color: #bdc3c7; 
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .links-grid { display: grid; gap: 10px; }

        .link-btn {
            background: transparent;
            border: 1px solid rgba(0, 242, 255, 0.5);
            color: white;
            padding: 13px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-btn:hover { 
            background: var(--neon); 
            color: var(--dark); 
            transform: scale(1.03);
            border-color: var(--neon);
        }

        /* تمييز زر الصوت الجديد */
        .audio-special {
            border-color: var(--pink);
            background: rgba(255, 0, 255, 0.05);
        }

        #music-container { display: none; }

        .footer { margin-top: 25px; font-size: 10px; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="music-container">
    <iframe id="youtube-player" 
            src="https://www.youtube.com/embed/Orvk4ElMZvU?enablejsapi=1&autoplay=1&mute=0&loop=1&playlist=Orvk4ElMZvU" 
            allow="autoplay">
    </iframe>
</div>

<div class="card">
    <div class="avatar-container">
        <img src="https://i.ibb.co/3mS7pXG/image-0.png" alt="Ahmed Adel / MOHA">
    </div>
    
    <h1>Ahmed Adel / MOHA</h1>
    <span class="subtitle">ARCHITECT • DEVELOPER • TRADER</span>

    <p class="bio">
        طالب هندسة معمارية، مطور أنظمة، ومتداول محترف. ندمج بين دقة التصميم الهندسي وقوة التحليل التقني في إمبراطورية <b>MOHA</b>.
    </p>

    <div class="links-grid">
        <a href="https://files.catbox.moe/0btxrw.mp4" target="_blank" class="link-btn audio-special">
            <span>🔊</span> استمع إلى المقطع الصوتي
        </a>

        <a href="https://wa.me/249928372079" target="_blank" class="link-btn" style="border-color: var(--green);">
            <span>🟢</span> WhatsApp | 0928372079
        </a>

        <a href="https://www.instagram.com/rere_5_3_?igsh=MXFnYTdwdWh5Y2NzMQ%3D%3D&utm_source=qr" target="_blank" class="link-btn" style="border-color: #E1306C;">
            <span>📸</span> Instagram | MOHA
        </a>

        <a href="https://www.facebook.com/share/1C9nLeW1JS/?mibextid=wwXIfr" target="_blank" class="link-btn" style="border-color: #1877F2;">
            <span>🔵</span> Facebook | Empire
        </a>

        <a href="#" class="link-btn" style="border-color: var(--gold);">
            <span>📈</span> Trading & Analysis
        </a>
    </div>

    <div class="footer">
        © 2026 | MOHA EMPIRE
    </div>
</div>

<script>
    document.body.addEventListener('click', function() {
        var player = document.getElementById('youtube-player');
        player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
    }, { once: true });
</script>

</body>
</html>
