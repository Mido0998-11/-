<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Adel | MOHA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff00ff;
            --dark: #0a0f14;
            --card-bg: rgba(10, 15, 20, 0.95);
        }

        body {
            background: var(--dark);
            background-image: radial-gradient(circle at center, #1a2a3a 0%, #0a0f14 100%);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow: hidden; /* لمنع التمرير بسبب النجوم */
            position: relative;
        }

        /* --- تأثير النجوم المتساقطة --- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* لمنع التداخل مع العناصر الأخرى */
            z-index: 0;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* --- محتوى الصفحة الرئيسي --- */
        .page-container {
            width: 100%;
            max-width: 420px;
            padding-bottom: 50px;
            z-index: 1; /* ليكون فوق النجوم */
            position: relative;
        }

        /* الهيدر العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(10, 15, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--pink);
            text-shadow: 0 0 15px var(--pink);
        }

        .header .nav {
            display: flex;
            gap: 20px;
        }

        .header .nav a {
            text-decoration: none;
            color: #ccc;
            font-size: 16px;
        }

        .header .nav a.active {
            color: white;
            border-bottom: 2px solid var(--pink);
            padding-bottom: 4px;
        }

        /* الكارد الرئيسي */
        .main-content {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        /* صورة البروفايل المحدثة */
        .avatar-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            position: relative;
        }

        .avatar-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            box-shadow: 0 0 25px var(--cyan);
            overflow: hidden;
            background: #000;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* الاسم الجديد */
        h1 { 
            font-size: 32px; 
            margin: 10px 0; 
            font-weight: 800;
        }

        .name-main { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .name-sub { color: var(--pink); text-shadow: 0 0 10px var(--pink); }

        /* الوصف المحدث */
        .bio { 
            font-size: 19px; 
            line-height: 1.8; 
            color: #e0e0e0; 
            margin: 20px 0;
            font-weight: 400;
        }

        /* --- زر التحكم في الموسيقى الدائري المتحرك --- */
        .music-control-wrapper {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 101;
        }

        .music-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--pink);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            outline: none;
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.7);
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        /* الحلقة الدائرية المتحركة حول الزر */
        .music-btn-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--cyan);
            border-bottom-color: var(--cyan);
            animation: rotate-ring 2s linear infinite;
            pointer-events: none;
            opacity: 0; /* مخفية في البداية */
            transition: opacity 0.3s ease;
        }

        .music-btn.playing .music-btn-ring {
            opacity: 1; /* تظهر عند التشغيل */
        }

        @keyframes rotate-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* أيقونات حالة التشغيل */
        .music-icon {
            transition: opacity 0.3s ease;
        }

        .music-icon.play { opacity: 1; }
        .music-icon.pause { opacity: 0; position: absolute; }

        .music-btn.playing .music-icon.play { opacity: 0; position: absolute; }
        .music-btn.playing .music-icon.pause { opacity: 1; position: relative; }

        /* الأزرار العائمة */
        .floating-controls {
            position: fixed;
            right: 25px;
            top: 55%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 99;
        }

        .f-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 22px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .btn-web { background: #00d2ff; color: white; }

        /* روابط التواصل المحدثة مع الأيقونات */
        .social-bar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            padding: 0 20px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-link i {
            font-size: 24px;
            transition: transform 0.3s ease;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .social-link:hover i {
            transform: scale(1.2);
        }

        /* ألوان الخلفية عند التحويم لكل منصة */
        .social-link.facebook:hover {
            background-color: #1877F2;
            border-color: #1877F2;
        }

        .social-link.instagram:hover {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            border-color: transparent;
        }

        .social-link.whatsapp:hover {
            background-color: #25D366;
            border-color: #25D366;
        }

        /* عنصر الصوت المخفي */
        #bg-music { display: none; }

    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>

    <div class="page-container">
        <header class="header">
            <nav class="nav">
                <a href="#">تواصل</a>
                <a href="#">عني</a>
                <a href="#" class="active">الرئيسية</a>
            </nav>
            <div class="logo">MOHA</div>
        </header>

        <main class="main-content">
            <div class="avatar-wrapper">
                <div class="avatar-container">
                    <img src="https://files.catbox.moe/8j6tcm.jpg" alt="Ahmed Adel / MOHA">
                </div>
            </div>
            
            <h1><span class="name-main">Ahmed adel</span> / <span class="name-sub">moha</span></h1>

            <p class="bio">
                عاشق للتصميم المعماري ومجال التداول والبرمجة
            </p>

            <div class="floating-controls">
                <a href="https://mido0998-11.github.io/-/" class="f-btn btn-web">🌐</a>
            </div>

            <div class="social-bar">
                <a href="https://www.facebook.com/share/18bsBUgnkD/?mibextid=wwXIfr" class="social-link facebook" target="_blank">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://www.instagram.com/its_moha249?igsh=MXFnYTdwdWh5Y2NzMQ%3D%3D&utm_source=qr" class="social-link instagram" target="_blank">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://wa.me/249116881415" class="social-link whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp: 0116881415</span>
                </a>
            </div>
        </main>
    </div>

    <div class="music-control-wrapper">
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
            <div class="music-btn-ring"></div>
            <i class="fas fa-play music-icon play"></i>
            <i class="fas fa-pause music-icon pause"></i>
        </button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/0btxrw.mp4" type="audio/mp4">
        متصفحك لا يدعم عنصر الصوت.
    </audio>

    <script>
        // --- سكربت الموسيقى ---
        var music = document.getElementById('bg-music');
        var musicBtn = document.getElementById('musicBtn');
        var isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                music.play().then(() => {
                    musicBtn.classList.add('playing');
                    isPlaying = true;
                }).catch(error => {
                    console.error("خطأ في تشغيل الموسيقى:", error);
                    // قد يحدث خطأ إذا لم يتفاعل المستخدم مع الصفحة أولاً
                    alert("يرجى التفاعل مع الصفحة أولاً (النقر في أي مكان) لتتمكن من تشغيل الموسيقى.");
                });
            }
        }

        // محاولة التشغيل التلقائي عند أول نقرة في أي مكان بالشاشة (تجاوز قيود المتصفح)
        document.body.addEventListener('click', function() {
            if(!isPlaying) {
                //toggleMusic(); // تم التعليق لتجنب التشغيل المزعج، يمكن تفعيله إذا رغبت
            }
        }, { once: true });


        // --- سكربت النجوم المتساقطة ---
        const container = document.getElementById('starsContainer');
        const starCount = 50; // عدد النجوم

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // إعدادات عشوائية لكل نجمة
            const size = Math.random() * 3 + 1 + 'px'; // الحجم بين 1px و 4px
            star.style.width = size;
            star.style.height = size;
            
            star.style.left = Math.random() * 100 + 'vw'; // الموقع الأفقي عشوائي
            star.style.top = -Math.random() * 20 + 'px'; // البداية من فوق الشاشة بقليل
            
            // مدة التحرك (السرعة) عشوائية بين 5s و 15s
            const duration = Math.random() * 10 + 5 + 's';
            star.style.animationDuration = duration;
            
            // تأخير عشوائي لبدء السقوط
            star.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(star);

            // إزالة النجمة بعد انتهاء الحركة لتوفير الموارد
            setTimeout(() => {
                star.remove();
                createStar(); // إنشاء نجمة جديدة بدلاً منها
            }, (parseFloat(duration) + parseFloat(star.style.animationDelay)) * 1000);
        }

        // إنشاء النجوم الأولية
        for (let i = 0; i < starCount; i++) {
            createStar();
        }

    </script>

</body>
</html>
